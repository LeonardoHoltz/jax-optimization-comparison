exp_name: NE_CMA_ES_mushroom
save_path: outputs/${exp_name}
seed: 42
hooks: []
learning_rate: 0.001
epochs: 100

defaults:
  - trainer: es_trainer
  - dataset: pmlb_mushroom
  - model: linear
  - optimizer: adam
  - loss: cross_entropy

hydra:
  job:
    name: ${exp_name}
  run:
    dir: outputs/${exp_name}