exp_name: NE_${hydra:runtime.choices.optimizer}_${dataset.name}
save_path: outputs/${exp_name}
seed: 42
hooks: []
learning_rate: 0.001
generations: 100
eval_every_gen: 10

defaults:
  - trainer: es_trainer
  - dataset: pmlb_mushroom
  - model: linear
  - optimizer: cma_es
  - loss: cross_entropy
  - _self_

hydra:
  job:
    name: ${exp_name}
  run:
    dir: outputs/${exp_name}